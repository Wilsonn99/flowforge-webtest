name: CI

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 8

  build:
    runs-on: ubuntu-latest
    steps:
      - run: sleep 10

  heavy_tests:
    runs-on: ubuntu-latest
    steps:
      - run: |
          echo "pytest slow suite"
          sleep 50

  deploy:
    runs-on: ubuntu-latest
    needs: [lint, build, heavy_tests]
    steps:
      - run: sleep 5
